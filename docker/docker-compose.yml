version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tunnel-postgres
    environment:
      POSTGRES_DB: tunnel_monitor
      POSTGRES_USER: tunnel
      POSTGRES_PASSWORD: tunnel@2024
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../sql/01_init_postgresql.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../sql/03_mock_data.sql:/docker-entrypoint-initdb.d/03_mock.sql
    ports:
      - "5432:5432"
    networks:
      - tunnel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunnel -d tunnel_monitor"]
      interval: 10s
      timeout: 5s
      retries: 3

  tdengine:
    image: tdengine/tdengine:3.0.6.0
    container_name: tunnel-tdengine
    environment:
      TAOS_FQDN: tdengine
      TAOS_FIRST_EP: tdengine:6030
      TZ: Asia/Shanghai
    volumes:
      - tdengine-data:/var/lib/taos
      - ../sql/02_init_tdengine.sql:/init/02_init_tdengine.sql
    ports:
      - "6030-6049:6030-6049"
      - "6030-6049:6030-6049/udp"
    networks:
      - tunnel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "taos", "-u", "root", "-p", "taosdata", "-c", "select server_status()"]
      interval: 15s
      timeout: 10s
      retries: 3

  kafka:
    image: bitnami/kafka:3.6.1
    container_name: tunnel-kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - ALLOW_PLAINTEXT_LISTENER=yes
      - TZ=Asia/Shanghai
    volumes:
      - kafka-data:/bitnami/kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - tunnel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: tunnel-redis
    command: redis-server --requirepass tunnel@2024 --appendonly yes
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - tunnel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tunnel@2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: tunnel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
      - TZ=Asia/Shanghai
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - tunnel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ../backend
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: tunnel-backend
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=postgresql://postgres:5432/tunnel_monitor
      - QUARKUS_DATASOURCE_USERNAME=tunnel
      - QUARKUS_DATASOURCE_PASSWORD=tunnel@2024
      - QUARKUS_REDIS_HOSTS=redis://:tunnel@2024@redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TDENGINE_HOST=tdengine
      - TDENGINE_PORT=6030
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
      - TZ=Asia/Shanghai
    volumes:
      - ../backend/logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      tdengine:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - tunnel-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tunnel-frontend
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tunnel-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: tunnel-nginx
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../frontend/dist:/usr/share/nginx/html
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - tunnel-network
    restart: unless-stopped
    profiles:
      - standalone

volumes:
  postgres-data:
  tdengine-data:
  kafka-data:
  redis-data:
  es-data:

networks:
  tunnel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
