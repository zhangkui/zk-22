# 应用配置
quarkus.application.name=tunnel-monitor
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=*

# 数据源配置 - PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=tunnel
quarkus.datasource.password=tunnel123
quarkus.datasource.reactive.url=postgresql://localhost:5432/tunnel_monitor
quarkus.datasource.reactive.max-size=20

# Hibernate ORM 配置
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.packages=com.tunnel.monitor.entity

# JWT 配置
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://tunnel-monitor.com
quarkus.smallrye-jwt.enabled=true
quarkus.smallrye-jwt.token.header=Authorization
quarkus.smallrye-jwt.token.cookie=Bearer

# JWT 生成配置
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.sign.key-id=private-key

# Redis 配置
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.max-pool-size=10
quarkus.redis.timeout=10s

# Kafka 配置
kafka.bootstrap.servers=localhost:9092
kafka.acks=1
kafka.retries=0
kafka.key.serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# OpenAPI / Swagger 配置
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info.title=隧道结构健康监测系统 API
quarkus.smallrye-openapi.info.version=1.0.0
quarkus.smallrye-openapi.info.description=隧道结构健康监测系统后端 RESTful API

# 日志配置
quarkus.log.level=INFO
quarkus.log.category."com.tunnel.monitor".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%h] %-5p [%c{3.}] - %s%e%n

# Micrometer Prometheus 配置
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.jvm.enabled=true
quarkus.micrometer.binder.system.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# 健康检查配置
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.liveness-path=/health/live
quarkus.smallrye-health.readiness-path=/health/ready

# 文件上传配置
quarkus.http.limits.max-form-attribute-size=100M
quarkus.http.limits.max-body-size=100M

# 异步线程池配置
quarkus.thread-pool.core-threads=10
quarkus.thread-pool.max-threads=50
quarkus.thread-pool.queue-size=1000

# WebSocket 配置
quarkus.websocket.path=/ws
quarkus.websocket.max-frame-size=65536
quarkus.websocket.idle-timeout=300s
